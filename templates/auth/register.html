{% extends "layout.html" %}
{% block page_title %}Register{% endblock %}
{% block body %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title mb-3 text-center">Create an Account</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Account type</label>
                        <select name="role" class="form-select" required>
                            <option value="user">Trekker</option>
                            <option value="staff">Trek Staff</option>
                        </select>
                        <div class="form-text">Staff accounts need admin sign-off before first login.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone_no" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required minlength="4">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <p class="mt-3 text-center">
                    Already registered? <a href="{{ url_for('auth.login') }}">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
